<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LANUS Tactics Board</title>
<style>
  :root{
    --bg: #07090c;
    --panel: #0e1319;
    --panel-2: #131a22;
    --panel-3: #182129;
    --line: #223140;
    --line-soft: #1a232c;
    --ct: #4f8fe0;
    --ct-dark: #1c3a5e;
    --t: #e0973f;
    --t-dark: #6e3f10;
    --cyan: #4fd6c4;
    --amber: #f2c14e;
    --red: #ff5a4d;
    --grey: #9aa7b0;
    --text: #d9e2ea;
    --text-dim: #64727e;
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; background: var(--bg); color: var(--text); overflow:hidden; }
  body{ display:flex; flex-direction:column; height:100vh; }

  /* ---------- Header ---------- */
  header{
    display:flex; align-items:center; gap:16px;
    padding:10px 16px;
    border-bottom:1px solid var(--line);
    background: linear-gradient(180deg, var(--panel), var(--bg));
    flex:none;
  }
  .brand{ display:flex; align-items:baseline; gap:10px; }
  .brand .mark{ width:10px; height:10px; background:var(--cyan); box-shadow: 0 0 12px var(--cyan); transform: rotate(45deg); flex:none; align-self:center; }
  .brand h1{ font-size:15px; letter-spacing:4px; margin:0; font-weight:800; color:var(--text); }
  .brand h1 em{ font-style:normal; color:var(--cyan); }
  .maptabs{ display:flex; gap:4px; background:var(--panel-2); border:1px solid var(--line); padding:3px; border-radius:6px; margin-left:auto; }
  .maptabs button{ background:transparent; border:none; color:var(--text-dim); font-family:inherit; font-size:11.5px; letter-spacing:2px; padding:7px 14px; border-radius:4px; cursor:pointer; transition: all .15s ease; }
  .maptabs button.active{ background: var(--cyan); color:#04201c; font-weight:700; }
  .maptabs button:not(.active):hover{ color:var(--text); }

  /* ---------- Layout ---------- */
  .app{ flex:1; display:flex; min-height:0; }

  /* ---------- Sidebar ---------- */
  aside{
    width:236px; flex:none; display:flex; flex-direction:column;
    background:var(--panel); border-right:1px solid var(--line);
    min-height:0;
  }
  .side-head{
    padding:12px 14px 8px;
    font-size:11px; letter-spacing:3px; color:var(--text-dim); font-weight:700;
  }
  .save-row{ display:flex; gap:6px; padding:0 12px 10px; }
  .save-row input{
    flex:1; min-width:0; background:var(--panel-2); border:1px solid var(--line);
    border-radius:5px; color:var(--text); font-family:inherit; font-size:12px;
    padding:8px 9px; outline:none;
  }
  .save-row input:focus{ border-color:var(--cyan); }
  .save-row button{
    background:var(--cyan); color:#04201c; border:none; border-radius:5px;
    font-family:inherit; font-size:11px; font-weight:800; letter-spacing:1px;
    padding:0 12px; cursor:pointer;
  }
  .save-row button:hover{ filter:brightness(1.1); }
  .setup-list{ flex:1; overflow-y:auto; padding:2px 8px 8px; }
  .setup-list::-webkit-scrollbar{ width:8px; }
  .setup-list::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  .setup{
    display:flex; align-items:center; gap:8px;
    background:var(--panel-2); border:1px solid var(--line-soft); border-radius:6px;
    padding:8px 10px; margin-bottom:6px; cursor:pointer;
    transition: border-color .12s ease, background .12s ease;
  }
  .setup:hover{ border-color:var(--cyan); background:var(--panel-3); }
  .setup .tag{
    font-size:9px; letter-spacing:1px; font-weight:800; flex:none;
    padding:3px 6px; border-radius:3px; background:#0a2a26; color:var(--cyan);
    border:1px solid #1c4a44;
  }
  .setup .tag.mirage{ background:#2a1f0a; color:var(--amber); border-color:#4a3a1c; }
  .setup .name{ flex:1; min-width:0; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .setup .del{
    background:none; border:none; color:var(--text-dim); font-size:14px;
    cursor:pointer; padding:2px 4px; line-height:1; flex:none; font-family:inherit;
  }
  .setup .del:hover{ color:var(--red); }
  .empty-note{ font-size:11px; color:var(--text-dim); padding:6px 8px; line-height:1.6; }
  .side-foot{ padding:10px 12px; border-top:1px solid var(--line); display:flex; gap:6px; }
  .side-foot button{
    flex:1; background:var(--panel-2); border:1px solid var(--line); border-radius:5px;
    color:var(--text-dim); font-family:inherit; font-size:10.5px; letter-spacing:1px;
    padding:8px 0; cursor:pointer;
  }
  .side-foot button:hover{ color:var(--text); border-color:var(--cyan); }

  /* ---------- Workspace ---------- */
  .workspace{ flex:1; display:flex; flex-direction:column; min-width:0; min-height:0; }

  .toolbar{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:8px 14px; background:var(--panel); border-bottom:1px solid var(--line);
    flex:none;
  }
  .toolgroup{ display:flex; gap:3px; background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:3px; }
  .toolbtn{
    display:flex; align-items:center; gap:6px;
    background:transparent; border:none; color:var(--text-dim);
    font-family:inherit; font-size:10.5px; letter-spacing:1px;
    padding:7px 9px; border-radius:4px; cursor:pointer;
    transition: all .12s ease; white-space:nowrap;
  }
  .toolbtn svg{ width:15px; height:15px; flex:none; }
  .toolbtn:hover{ color:var(--text); background:var(--line-soft); }
  .toolbtn.active{ background: var(--cyan); color:#04201c; font-weight:800; }
  .toolbtn.active svg{ stroke:#04201c; }
  .swatches{ display:flex; gap:5px; align-items:center; padding:0 6px; }
  .swatch{
    width:18px; height:18px; border-radius:50%; cursor:pointer;
    border:2px solid transparent; transition: transform .1s ease;
  }
  .swatch.active{ border-color:#fff; transform:scale(1.15); }
  .spacer{ flex:1; }
  .hint{ font-size:10.5px; color:var(--text-dim); letter-spacing:.5px; }

  .stage{
    flex:1; position:relative; min-height:0; overflow:hidden;
    background:
      radial-gradient(circle at 30% 20%, #0c1218 0%, var(--bg) 70%);
  }
  svg#board{
    position:absolute; inset:0; width:100%; height:100%;
    touch-action:none; cursor:crosshair; display:block;
  }
  svg#board.select-mode{ cursor:grab; }
  svg#board.select-mode:active{ cursor:grabbing; }

  .token{ cursor: grab; touch-action:none; }
  .token:active{ cursor: grabbing; }
  .anno.util-icon{ cursor: grab; touch-action:none; }

  /* zoom controls */
  .zoomctl{
    position:absolute; right:14px; bottom:14px;
    display:flex; flex-direction:column; gap:4px;
    background:rgba(14,19,25,.9); border:1px solid var(--line); border-radius:8px;
    padding:5px; backdrop-filter: blur(4px);
  }
  .zoomctl button{
    width:34px; height:32px; background:transparent; border:none; border-radius:5px;
    color:var(--text-dim); font-family:inherit; font-size:15px; font-weight:800;
    cursor:pointer;
  }
  .zoomctl button:hover{ color:var(--cyan); background:var(--line-soft); }
  .zoomctl .fit{ font-size:9px; letter-spacing:1px; }

  /* floating text input */
  #textEntry{
    position:absolute; display:none;
    background:var(--panel-2); border:1px solid var(--cyan); border-radius:5px;
    color:var(--text); font-family:inherit; font-size:13px;
    padding:6px 8px; outline:none; z-index:20; min-width:130px;
  }

  @media (max-width: 860px){
    aside{ width:180px; }
    .toolbtn span.label{ display:none; }
    .toolbtn{ padding:8px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark"></div>
    <h1><em>LANUS</em>&nbsp;TACTICS BOARD</h1>
  </div>
  <div class="maptabs">
    <button id="tab-dust2" class="active">DUST II</button>
    <button id="tab-mirage">MIRAGE</button>
  </div>
</header>

<div class="app">

  <aside>
    <div class="side-head">SAVED SETUPS</div>
    <div class="save-row">
      <input id="setupName" type="text" placeholder="setup name…" maxlength="40">
      <button id="btn-save">SAVE</button>
    </div>
    <div class="setup-list" id="setupList">
      <div class="empty-note">No setups yet. Position players, draw your plan, name it and hit SAVE.</div>
    </div>
    <div class="side-foot">
      <button id="btn-export">EXPORT</button>
      <button id="btn-import">IMPORT</button>
      <input id="importFile" type="file" accept="application/json" style="display:none">
    </div>
  </aside>

  <div class="workspace">
    <div class="toolbar">
      <div class="toolgroup" id="tools">
        <button class="toolbtn active" data-tool="select" title="Move players / pan the map">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 3l7 17 2-7 7-2z"/></svg>
          <span class="label">MOVE</span>
        </button>
        <button class="toolbtn" data-tool="arrow" title="Draw movement arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20L20 4M20 4h-8M20 4v8"/></svg>
          <span class="label">ARROW</span>
        </button>
        <button class="toolbtn" data-tool="pen" title="Freehand pen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3l4 4L8 20l-5 1 1-5z"/></svg>
          <span class="label">PEN</span>
        </button>
        <button class="toolbtn" data-tool="text" title="Place a text label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h14M12 4v16"/></svg>
          <span class="label">TEXT</span>
        </button>
      </div>

      <div class="toolgroup">
        <button class="toolbtn" data-tool="smoke" title="Place smoke">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 17c0-2 2-2 2-4s-2-2-2-4 2-2 2-4M9 17c0-2 2-2 2-4s-2-2-2-4 2-2 2-4M14 17c0-2 2-2 2-4s-2-2-2-4 2-2 2-4"/></svg>
          <span class="label">SMOKE</span>
        </button>
        <button class="toolbtn" data-tool="flash" title="Place flash">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg>
          <span class="label">FLASH</span>
        </button>
        <button class="toolbtn" data-tool="molotov" title="Place molotov / fire">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c2 3-2 4-2 7a4 4 0 108 0c0-2-1-3-2-4 .5 2-1 2-1 1 0-2-2-2-3-4z"/></svg>
          <span class="label">FIRE</span>
        </button>
        <button class="toolbtn" data-tool="bomb" title="Place the bomb / plant spot">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="14" r="7"/><path d="M15 8l2-2M17 6l2-2M17 6l1.5 1.5"/></svg>
          <span class="label">BOMB</span>
        </button>
      </div>

      <div class="toolgroup">
        <button class="toolbtn" data-tool="eraser" title="Click a drawing to erase it">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H8L3 15a2 2 0 010-3l8-8a2 2 0 013 0l6 6a2 2 0 010 3l-7 7"/></svg>
          <span class="label">ERASE</span>
        </button>
        <button class="toolbtn" id="btn-undo" title="Undo last drawing">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14L4 9l5-5M4 9h11a5 5 0 010 10h-1"/></svg>
          <span class="label">UNDO</span>
        </button>
        <button class="toolbtn" id="btn-clear" title="Clear all drawings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>
          <span class="label">CLEAR</span>
        </button>
        <button class="toolbtn" id="btn-reset" title="Reset player positions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12a8 8 0 1 1 2.5 5.8M4 12v5h5"/></svg>
          <span class="label">RESET</span>
        </button>
      </div>

      <div class="swatches" id="swatches" title="Drawing colour">
        <div class="swatch active" data-color="#4fd6c4" style="background:#4fd6c4"></div>
        <div class="swatch" data-color="#4f8fe0" style="background:#4f8fe0"></div>
        <div class="swatch" data-color="#e0973f" style="background:#e0973f"></div>
        <div class="swatch" data-color="#ff5a4d" style="background:#ff5a4d"></div>
        <div class="swatch" data-color="#e8eef4" style="background:#e8eef4"></div>
      </div>

      <div class="spacer"></div>
      <div class="hint" id="hint"></div>
    </div>

    <div class="stage" id="stage">
      <svg id="board" class="select-mode">
        <defs>
          <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
          </filter>
          <marker id="arrowHead-c0" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4fd6c4"></path></marker>
          <marker id="arrowHead-c1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4f8fe0"></path></marker>
          <marker id="arrowHead-c2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e0973f"></path></marker>
          <marker id="arrowHead-c3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ff5a4d"></path></marker>
          <marker id="arrowHead-c4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e8eef4"></path></marker>
        </defs>
        <g id="mapLayer"></g>
        <g id="annotationLayer"></g>
        <g id="tokenLayer"></g>
      </svg>

      <div class="zoomctl">
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-out" title="Zoom out">−</button>
        <button id="zoom-fit" class="fit" title="Fit map to screen">FIT</button>
      </div>

      <input id="textEntry" type="text" placeholder="label…" maxlength="40">
    </div>
  </div>
</div>

  let currentMapId = 'dust2';
  let curW = 1024, curH = 1024;
  let scaleUnit = 1;           // token/stroke scaling per map
  let tool = 'select';
  let drawColor = '#4fd6c4';
  let players = { ct: [], t: [] };   // arrays of <g> nodes
  let annotations = [];              // [{data, node}]
  let history = [];                  // stack of annotation entries for undo
  let setups = [];                   // [{name, map, state}]

  // view (zoom/pan) in SVG coordinates
  let view = {x:0, y:0, w:1024, h:1024};

  // ---------------- Helpers ----------------
  function el(tag, attrs){
    const e = document.createElementNS(SVGNS, tag);
    for(const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function clearNode(n){ while(n.firstChild) n.removeChild(n.firstChild); }
  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
  function pointFromEvent(evt){
    const pt = svg.createSVGPoint();
    pt.x = evt.clientX; pt.y = evt.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  // ---------------- View / zoom ----------------
  function applyView(){
    svg.setAttribute('viewBox', `${view.x} ${view.y} ${view.w} ${view.h}`);
  }
  function fitView(){
    // letterbox the map into the stage while keeping aspect
    const sw = stage.clientWidth, sh = stage.clientHeight;
    const mapAR = curW / curH, stageAR = sw / sh;
    if(stageAR > mapAR){
      view.h = curH * 1.02;
      view.w = view.h * stageAR;
    } else {
      view.w = curW * 1.02;
      view.h = view.w / stageAR;
    }
    view.x = (curW - view.w)/2;
    view.y = (curH - view.h)/2;
    applyView();
  }
  function zoomAt(cx, cy, factor){
    const minW = curW/8, maxW = curW*2.5;
    const newW = clamp(view.w * factor, minW, maxW);
    const k = newW / view.w;
    view.x = cx - (cx - view.x) * k;
    view.y = cy - (cy - view.y) * k;
    view.w = newW;
    view.h = view.h * k;
    applyView();
  }
  stage.addEventListener('wheel', (evt)=>{
    evt.preventDefault();
    const p = pointFromEvent(evt);
    zoomAt(p.x, p.y, evt.deltaY > 0 ? 1.12 : 0.89);
  }, {passive:false});
  document.getElementById('zoom-in').addEventListener('click', ()=> zoomAt(view.x+view.w/2, view.y+view.h/2, 0.8));
  document.getElementById('zoom-out').addEventListener('click', ()=> zoomAt(view.x+view.w/2, view.y+view.h/2, 1.25));
  document.getElementById('zoom-fit').addEventListener('click', fitView);
  window.addEventListener('resize', fitView);

  // ---------------- Map rendering ----------------
  function renderMap(mapId){
    currentMapId = mapId;
    const m = MAPS[mapId];
    curW = m.w; curH = m.h;
    scaleUnit = Math.min(curW, curH) / 1000;

    clearNode(mapLayer); clearNode(annotationLayer); clearNode(tokenLayer);
    annotations = []; history = [];

    mapLayer.appendChild(el('image', {
      href:m.img, x:0, y:0, width:curW, height:curH, preserveAspectRatio:'none'
    }));

    resetPositions();
    fitView();
    setHint();
  }

  // ---------------- Tokens ----------------
  function tokenR(){ return Math.max(11, 22 * scaleUnit); }
  function makeToken(team, idx, x, y){
    const color = team==='ct' ? 'var(--ct)' : 'var(--t)';
    const dark  = team==='ct' ? 'var(--ct-dark)' : 'var(--t-dark)';
    const r = tokenR();
    const g = el('g', {class:'token', filter:'url(#softShadow)'});
    g.appendChild(el('circle', {cx:0, cy:0, r, fill:color, stroke:dark, 'stroke-width':Math.max(2, r*0.17)}));
    const t = el('text', {x:0, y:1, 'text-anchor':'middle', 'dominant-baseline':'middle',
      fill:'#0b1116', 'font-size':Math.max(9, r*0.72), 'font-weight':800});
    t.textContent = (team==='ct'?'C':'T') + idx;
    g.appendChild(t);
    setPos(g, x, y);
    attachDrag(g);
    tokenLayer.appendChild(g);
    return g;
  }
  function setPos(node, x, y){
    node.setAttribute('transform', `translate(${x},${y})`);
    node.dataset.x = x; node.dataset.y = y;
  }
  function resetPositions(){
    clearNode(tokenLayer);
    const xs = [0.30, 0.40, 0.50, 0.60, 0.70];
    players.ct = xs.map((f,i)=> makeToken('ct', i+1, curW*f, curH*0.06));
    players.t  = xs.map((f,i)=> makeToken('t',  i+1, curW*f, curH*0.94));
  }

  // ---------------- Dragging + panning ----------------
  let dragTarget = null;
  let panning = null;
  function attachDrag(node){
    node.addEventListener('pointerdown', (evt)=>{
      if(tool !== 'select') return;
      evt.stopPropagation();
      dragTarget = node;
      node.setPointerCapture && node.setPointerCapture(evt.pointerId);
    });
  }
  svg.addEventListener('pointerdown', (evt)=>{
    if(tool === 'select'){
      panning = {sx:evt.clientX, sy:evt.clientY, vx:view.x, vy:view.y};
      return;
    }
    handleDrawStart(evt);
  });
  window.addEventListener('pointermove', (evt)=>{
    if(dragTarget){
      const p = pointFromEvent(evt);
      setPos(dragTarget, clamp(p.x, 0, curW), clamp(p.y, 0, curH));
      return;
    }
    if(panning){
      const scale = view.w / stage.clientWidth;
      view.x = panning.vx - (evt.clientX - panning.sx) * scale;
      view.y = panning.vy - (evt.clientY - panning.sy) * scale;
      applyView();
      return;
    }
    handleDrawMove(evt);
  });
  window.addEventListener('pointerup', ()=>{
    dragTarget = null; panning = null;
    handleDrawEnd();
  });

  // ---------------- Annotations (data-driven, serializable) ----------------
  function addAnnotation(data){
    const node = buildAnnotationNode(data);
    if(!node) return null;
    node.classList.add('anno');
    annotationLayer.appendChild(node);
    const entry = {data, node};
    annotations.push(entry);
    history.push(entry);
    // erase interactions
    node.addEventListener('pointerdown', (evt)=>{
      if(tool === 'eraser'){ evt.stopPropagation(); removeEntry(entry); }
    });
    node.addEventListener('dblclick', (evt)=>{ evt.stopPropagation(); removeEntry(entry); });
    if(data.type === 'util' || data.type === 'text') attachDrag(node), node.classList.add('util-icon');
    return entry;
  }
  function removeEntry(entry){
    entry.node.remove();
    annotations = annotations.filter(a=>a!==entry);
    history = history.filter(a=>a!==entry);
  }
  function colorKey(c){
    const map = {'#4fd6c4':'c0','#4f8fe0':'c1','#e0973f':'c2','#ff5a4d':'c3','#e8eef4':'c4'};
    return map[c] || 'c0';
  }
  function buildAnnotationNode(d){
    const sw = Math.max(2.5, 5 * scaleUnit);
    if(d.type === 'arrow'){
      return el('path', {
        d:`M${d.x1},${d.y1} L${d.x2},${d.y2}`,
        stroke:d.color, 'stroke-width':sw, fill:'none',
        'stroke-linecap':'round', 'marker-end':'url(#arrowHead-' + colorKey(d.color) + ')'
      });
    }
    if(d.type === 'pen'){
      return el('path', {
        d:d.d, stroke:d.color, 'stroke-width':sw*0.75, fill:'none',
        'stroke-linecap':'round', 'stroke-linejoin':'round'
      });
    }
    if(d.type === 'text'){
      const g = el('g', {filter:'url(#softShadow)'});
      const fs = Math.max(12, 20 * scaleUnit);
      const t = el('text', {x:0, y:0, fill:d.color, 'font-size':fs, 'font-weight':700, 'letter-spacing':'1'});
      t.textContent = d.txt;
      g.appendChild(t);
      g.setAttribute('transform', `translate(${d.x},${d.y})`);
      g.dataset.x = d.x; g.dataset.y = d.y;
      return g;
    }
    if(d.type === 'util'){
      const colors = { smoke:'#9aa7b0', flash:'#f2c14e', molotov:'#ff5a4d', bomb:'#ff5a4d' };
      const glyphs = {
        smoke:'M4 17c0-2 2-2 2-4s-2-2-2-4 2-2 2-4M9 17c0-2 2-2 2-4s-2-2-2-4 2-2 2-4M14 17c0-2 2-2 2-4s-2-2-2-4 2-2 2-4',
        flash:'M13 2L4 14h6l-1 8 9-12h-6l1-8z',
        molotov:'M12 2c2 3-2 4-2 7a4 4 0 108 0c0-2-1-3-2-4 .5 2-1 2-1 1 0-2-2-2-3-4z',
        bomb:'M11 7a7 7 0 100 14 7 7 0 000-14zM15 8l2-2M17 6l2-2'
      };
      const r = Math.max(10, 19 * scaleUnit);
      const g = el('g', {filter:'url(#softShadow)'});
      g.appendChild(el('circle', {cx:0, cy:0, r, fill:'#12181e', stroke:colors[d.kind], 'stroke-width':Math.max(2, r*0.16), opacity:0.95}));
      if(d.kind === 'bomb'){
        const fs = r*0.95;
        const t = el('text', {x:0, y:1, 'text-anchor':'middle', 'dominant-baseline':'middle',
          fill:colors[d.kind], 'font-size':fs, 'font-weight':800});
        t.textContent = 'C4';
        g.appendChild(t);
      } else {
        const s = (r/20) * 0.82;
        g.appendChild(el('path', {d:glyphs[d.kind], fill:'none', stroke:colors[d.kind],
          'stroke-width':Math.max(1.4, 2*(r/20)), transform:`translate(${-9*s},${-10*s}) scale(${s})`}));
      }
      g.setAttribute('transform', `translate(${d.x},${d.y})`);
      g.dataset.x = d.x; g.dataset.y = d.y;
      return g;
    }
    return null;
  }

  // ---------------- Drawing handlers ----------------
  let drawing = null;
  function handleDrawStart(evt){
    if(evt.target.closest('.token')) return;
    if(tool === 'eraser') return; // handled on the annotation nodes
    const p = pointFromEvent(evt);
    if(tool === 'arrow'){
      const entry = addAnnotation({type:'arrow', x1:p.x, y1:p.y, x2:p.x, y2:p.y, color:drawColor});
      drawing = {mode:'arrow', entry};
    } else if(tool === 'pen'){
      const entry = addAnnotation({type:'pen', d:`M${p.x},${p.y}`, color:drawColor});
      drawing = {mode:'pen', entry};
    } else if(tool === 'text'){
      openTextEntry(evt, p);
    } else if(['smoke','flash','molotov','bomb'].includes(tool)){
      addAnnotation({type:'util', kind:tool, x:p.x, y:p.y});
    }
  }
  function handleDrawMove(evt){
    if(!drawing) return;
    const p = pointFromEvent(evt);
    if(drawing.mode === 'arrow'){
      const d = drawing.entry.data;
      d.x2 = p.x; d.y2 = p.y;
      drawing.entry.node.setAttribute('d', `M${d.x1},${d.y1} L${d.x2},${d.y2}`);
    } else if(drawing.mode === 'pen'){
      const d = drawing.entry.data;
      d.d += ` L${p.x},${p.y}`;
      drawing.entry.node.setAttribute('d', d.d);
    }
  }
  function handleDrawEnd(){ drawing = null; }

  // text label entry
  let pendingText = null;
  function openTextEntry(evt, p){
    pendingText = {x:p.x, y:p.y};
    const rect = stage.getBoundingClientRect();
    textEntry.style.left = (evt.clientX - rect.left) + 'px';
    textEntry.style.top  = (evt.clientY - rect.top) + 'px';
    textEntry.style.display = 'block';
    textEntry.value = '';
    setTimeout(()=> textEntry.focus(), 0);
  }
  textEntry.addEventListener('keydown', (evt)=>{
    if(evt.key === 'Enter'){
      const v = textEntry.value.trim();
      if(v && pendingText) addAnnotation({type:'text', x:pendingText.x, y:pendingText.y, txt:v, color:drawColor});
      closeTextEntry();
    } else if(evt.key === 'Escape'){ closeTextEntry(); }
  });
  textEntry.addEventListener('blur', closeTextEntry);
  function closeTextEntry(){ textEntry.style.display = 'none'; pendingText = null; }

  // ---------------- Toolbar ----------------
  document.getElementById('tools').addEventListener('click', pickTool);
  document.querySelectorAll('.toolgroup .toolbtn[data-tool]').forEach(b=> b.addEventListener('click', pickTool));
  function pickTool(evt){
    const btn = evt.target.closest('.toolbtn');
    if(!btn || !btn.dataset.tool) return;
    document.querySelectorAll('.toolbtn[data-tool]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    tool = btn.dataset.tool;
    svg.classList.toggle('select-mode', tool === 'select');
    setHint();
  }
  document.getElementById('btn-undo').addEventListener('click', ()=>{
    const last = history.pop();
    if(last){ last.node.remove(); annotations = annotations.filter(a=>a!==last); }
  });
  document.getElementById('btn-clear').addEventListener('click', ()=>{
    clearNode(annotationLayer); annotations = []; history = [];
  });
  document.getElementById('btn-reset').addEventListener('click', resetPositions);

  document.getElementById('swatches').addEventListener('click', (evt)=>{
    const s = evt.target.closest('.swatch');
    if(!s) return;
    document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
    s.classList.add('active');
    drawColor = s.dataset.color;
  });

  function setHint(){
    const msgs = {
      select:'drag players & icons · drag map to pan · scroll to zoom',
      arrow:'click-drag to draw a movement arrow',
      pen:'click-drag to sketch freehand',
      text:'click on the map, type a label, press Enter',
      smoke:'click to drop a smoke marker',
      flash:'click to drop a flash marker',
      molotov:'click to drop a fire marker',
      bomb:'click to drop the C4 marker',
      eraser:'click any drawing to erase it'
    };
    hint.textContent = msgs[tool] || '';
  }

  // ---------------- Saved setups ----------------
  const setupList = document.getElementById('setupList');
  const setupName = document.getElementById('setupName');

  function currentState(){
    return {
      ct: players.ct.map(g=>({x:+g.dataset.x, y:+g.dataset.y})),
      t:  players.t.map(g=>({x:+g.dataset.x, y:+g.dataset.y})),
      annos: annotations.map(a=>a.data)
    };
  }
  function applyState(state){
    state.ct.forEach((p,i)=> players.ct[i] && setPos(players.ct[i], p.x, p.y));
    state.t.forEach((p,i)=> players.t[i] && setPos(players.t[i], p.x, p.y));
    clearNode(annotationLayer); annotations = []; history = [];
    state.annos.forEach(d=> addAnnotation(JSON.parse(JSON.stringify(d))));
    history = [];
  }
  function saveSetup(){
    let name = setupName.value.trim();
    if(!name) name = MAPS[currentMapId].label + ' setup ' + (setups.length + 1);
    const existing = setups.find(s=> s.name === name && s.map === currentMapId);
    if(existing){ existing.state = currentState(); }
    else setups.push({name, map:currentMapId, state:currentState()});
    setupName.value = '';
    renderSetupList();
  }
  document.getElementById('btn-save').addEventListener('click', saveSetup);
  setupName.addEventListener('keydown', (e)=>{ if(e.key==='Enter') saveSetup(); });

  function renderSetupList(){
    setupList.innerHTML = '';
    if(setups.length === 0){
      setupList.innerHTML = '<div class="empty-note">No setups yet. Position players, draw your plan, name it and hit SAVE.</div>';
      return;
    }
    setups.forEach((s, idx)=>{
      const item = document.createElement('div');
      item.className = 'setup';
      item.innerHTML = `
        <span class="tag ${s.map==='mirage'?'mirage':''}">${s.map==='mirage'?'MIR':'D2'}</span>
        <span class="name" title="${s.name}">${s.name}</span>
        <button class="del" title="Delete">×</button>`;
      item.addEventListener('click', (evt)=>{
        if(evt.target.classList.contains('del')){
          setups.splice(idx,1); renderSetupList(); return;
        }
        loadSetup(s);
      });
      setupList.appendChild(item);
    });
  }
  function loadSetup(s){
    if(s.map !== currentMapId){
      switchTab(s.map);
    }
    applyState(s.state);
  }

  // export / import
  document.getElementById('btn-export').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(setups, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'lanus-setups.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });
  document.getElementById('btn-import').addEventListener('click', ()=> document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', (evt)=>{
    const f = evt.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const arr = JSON.parse(reader.result);
        if(Array.isArray(arr)){
          arr.forEach(s=>{
            if(s && s.name && s.map && s.state && !setups.some(x=>x.name===s.name && x.map===s.map)) setups.push(s);
          });
          renderSetupList();
        }
      }catch(e){ /* ignore malformed files */ }
      evt.target.value = '';
    };
    reader.readAsText(f);
  });

  // ---------------- Map tabs ----------------
  function switchTab(mapId){
    document.getElementById('tab-dust2').classList.toggle('active', mapId==='dust2');
    document.getElementById('tab-mirage').classList.toggle('active', mapId==='mirage');
    renderMap(mapId);
  }
  document.getElementById('tab-dust2').addEventListener('click', ()=> switchTab('dust2'));
  document.getElementById('tab-mirage').addEventListener('click', ()=> switchTab('mirage'));

  // init
  renderMap('dust2');
})();
</script>
</body>
</html>
